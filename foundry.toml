[profile.default]
src = "contracts"
test = "test"
script = "script"
out = "out"
libs = ["node_modules", "lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.fuzz]
runs = 1000

[profile.default.invariant]
runs = 256
depth = 15

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
